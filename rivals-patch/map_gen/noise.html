<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <title>Procedurální mapa – města, bigPOI a cesty</title>
  <style>
    body { font-family: sans-serif; background: #1b1b1b; color: #eee; text-align: center; }
    canvas { border: 1px solid #555; margin-top: 10px; background: #111; }
    .controls { margin: 10px 0; }
    input { width: 60px; text-align: center; }
    .legend { display: flex; justify-content: center; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
    .legend div { display: flex; align-items: center; gap: 5px; }
    .color-box { width: 16px; height: 16px; border: 1px solid #444; }
  </style>
</head>
<body>
<h1>🗺️ Procedurální mapa – města, BigPOI a cesty</h1>

<div class="controls">
  <label>Seed: <input id="seed" type="number" value="42"></label>
  <label>Velikost mapy: <input id="mapSize" type="number" value="20" min="10" max="100"></label>
  <label>Počet měst: <input id="numCities" type="number" value="3" min="1"></label>
  <label>Počet BigPOI: <input id="numBigPOI" type="number" value="3" min="1"></label>
  <label>Hustota malých POI: <input id="poiDensity" type="number" step="0.1" min="0" max="1" value="0.2"></label>
  <button id="generate">Vygenerovat</button>
</div>

<canvas id="mapCanvas" width="500" height="500"></canvas>

<div class="legend">
  <div><div class="color-box" style="background:#0066cc"></div>Voda</div>
  <div><div class="color-box" style="background:#f4a460"></div>Poušť</div>
  <div><div class="color-box" style="background:#228B22"></div>Les</div>
  <div><div class="color-box" style="background:#7CFC00"></div>Pláně</div>
  <div><div class="color-box" style="background:#8B4513"></div>Hory</div>
  <div><div class="color-box" style="background:#aa0000"></div>Nepřístupné</div>
  <div><div class="color-box" style="background:#888"></div>Cesta</div>
  <div><div class="color-box" style="background:#ffff00"></div>Město</div>
  <div><div class="color-box" style="background:#800080"></div>BigPOI</div>
</div>

<script src="noise.js"></script>
<script>
const canvas = document.getElementById('mapCanvas');
const ctx = canvas.getContext('2d');

document.getElementById('generate').addEventListener('click', generateMap);

function generateMap() {
  const seed = Number(document.getElementById('seed').value);
  const size = Number(document.getElementById('mapSize').value);
  const numCities = Number(document.getElementById('numCities').value);
  const numBigPOI = Number(document.getElementById('numBigPOI').value);
  const poiDensity = Number(document.getElementById('poiDensity').value);

  const scale = 3;
  const elevationNoise = new Noise(seed);
  const moistureNoise = new Noise(seed + 1000);
  const rand = mulberry32(seed);

  // vytvoření mapy
  const map = Array.from({ length: size }, (_, y) =>
    Array.from({ length: size }, (_, x) => ({
      x, y, terrain: 'unknown', color: '#000', walkable: false, poi: null, elevation: 0, moisture: 0, isRoad: false
    }))
  );

  // === 1. umístění měst a BigPOI deterministicky ===
  const cities = [];
  const bigPOI = [];

  for (let i = 0; i < numCities; i++) {
    const x = Math.floor(rand() * size);
    const y = Math.floor(rand() * size);
    cities.push({x, y});
    map[y][x].color = '#ffff00';
    map[y][x].walkable = true;
    map[y][x].poi = 'City';
  }

  for (let i = 0; i < numBigPOI; i++) {
    const x = Math.floor(rand() * size);
    const y = Math.floor(rand() * size);
    bigPOI.push({x, y});
    map[y][x].color = '#800080';
    map[y][x].walkable = true;
    map[y][x].poi = 'BigPOI';
  }

  // === 2. generování cest mezi městy a BigPOI ===
  const pointsToConnect = cities.concat(bigPOI);
  for (let i = 0; i < pointsToConnect.length; i++) {
    for (let j = i + 1; j < pointsToConnect.length; j++) {
      createPath(map, pointsToConnect[i], pointsToConnect[j], rand);
    }
  }

  // === 3. generování biomy a malé POI ===
  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      if(map[y][x].poi) continue; // města, BigPOI a cesty ponecháme

      const nx = x / size - 0.5;
      const ny = y / size - 0.5;

      const elevation = elevationNoise.perlin2(nx * scale, ny * scale);
      const moisture = moistureNoise.perlin2(nx * scale * 0.8, ny * scale * 0.8);
      const biome = getBiome(elevation, moisture);

      map[y][x].biome = biome.name;
      map[y][x].color = biome.color;
      map[y][x].walkable = biome.walkable;
      map[y][x].elevation = elevation;
      map[y][x].moisture = moisture;

      if(biome.walkable && Math.random() < poiDensity){
        map[y][x].poi = randomPOI(biome.name);
      }
    }
  }

  drawMap(map, size);
}

// === funkce pro vytvoření cesty mezi dvěma body ===
function createPath(map, start, end, rand) {
  let x = start.x, y = start.y;
  const size = map.length;

  while(x !== end.x || y !== end.y){
    map[y][x].isRoad = true;
    map[y][x].walkable = true;
    map[y][x].color = '#888';

    if(x < end.x) x++;
    else if(x > end.x) x--;
    if(y < end.y) y++;
    else if(y > end.y) y--;

    // malé kličkování
    if(rand() < 0.2) x += (rand() < 0.5 ? 1 : -1);
    if(rand() < 0.2) y += (rand() < 0.5 ? 1 : -1);
    x = Math.max(0, Math.min(size-1, x));
    y = Math.max(0, Math.min(size-1, y));
  }
}

// === Biomy ===
function getBiome(elevation, moisture){
  if(elevation < -0.1) return {name:'water', color:'#0066cc', walkable:false};
  if(elevation > 0.65) return {name:'impassable', color:'#aa0000', walkable:false};
  if(elevation > 0.45) return {name:'mountain', color:'#8B4513', walkable:true};
  if(moisture < -0.3) return {name:'desert', color:'#f4a460', walkable:true};
  if(moisture > 0.3) return {name:'forest', color:'#228B22', walkable:true};
  return {name:'plains', color:'#7CFC00', walkable:true};
}

// === malé POI ===
function randomPOI(biome){
  const options = {
    forest:['Camp','Ruins'],
    plains:['Farm','Village'],
    mountain:['Mine','Cave'],
    desert:['Oasis','Ruins']
  };
  const list = options[biome] || ['Camp'];
  return list[Math.floor(Math.random()*list.length)];
}

// === vykreslení mapy ===
function drawMap(map, size){
  const cellSize = canvas.width / size;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let y=0; y<size; y++){
    for(let x=0; x<size; x++){
      const tile = map[y][x];
      const px = x*cellSize;
      const py = y*cellSize;
      ctx.fillStyle = tile.color;
      ctx.fillRect(px, py, cellSize, cellSize);

      if(tile.poi && tile.poi !== 'City' && tile.poi !== 'BigPOI'){
        ctx.fillStyle = '#fff';
        ctx.font = `${cellSize*0.35}px bold sans-serif`;
        ctx.textAlign='center';
        ctx.textBaseline='middle';
        ctx.fillText(tile.poi[0], px+cellSize/2, py+cellSize/2);
      }

      ctx.strokeStyle='#333';
      ctx.strokeRect(px, py, cellSize, cellSize);
    }
  }
}

// === deterministické RNG ===
function mulberry32(a) {
  return function() {
    var t = (a += 0x6D2B79F5);
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

generateMap();
</script>
